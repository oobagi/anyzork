services:
  catalog:
    image: ghcr.io/oobagi/anyzork-catalog:latest
    expose:
      - "8000"
    environment:
      - ANYZORK_ADMIN_TOKEN=${ANYZORK_ADMIN_TOKEN}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - ANYZORK_EMAIL_FROM=${ANYZORK_EMAIL_FROM:-}
    volumes:
      - catalog-data:/root/.anyzork/public_catalog
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  caddy:
    image: caddy:2
    ports:
      - "${BIND_IP:-0.0.0.0}:80:80"
      - "${BIND_IP:-0.0.0.0}:443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_LABEL_ENABLE=true
    restart: unless-stopped

volumes:
  catalog-data:
  caddy-data:
  caddy-config:
