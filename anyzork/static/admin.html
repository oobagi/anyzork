<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnyZork Admin</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #22262f;
    --border: #2a2e3a;
    --text: #e4e6eb;
    --text-muted: #8b8fa3;
    --accent: #6c63ff;
    --accent-hover: #5a52e0;
    --green: #2ecc71;
    --green-bg: rgba(46, 204, 113, 0.12);
    --yellow: #f1c40f;
    --yellow-bg: rgba(241, 196, 15, 0.12);
    --red: #e74c3c;
    --red-bg: rgba(231, 76, 60, 0.12);
    --radius: 12px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header h1 {
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .header h1 span { color: var(--accent); }
  .btn-logout {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  /* Login */
  .login-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 20px;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 28px;
    width: 100%;
    max-width: 380px;
  }
  .login-card h2 {
    font-size: 1.3rem;
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }
  .login-card p {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-bottom: 24px;
  }
  .input {
    width: 100%;
    padding: 14px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 1rem;
    outline: none;
    transition: border 0.15s;
  }
  .input:focus { border-color: var(--accent); }
  .input::placeholder { color: var(--text-muted); }

  .btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 14px;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--accent-hover); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Content area */
  .content { padding: 20px; max-width: 720px; margin: 0 auto; }

  .stats-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    flex: 1;
    min-width: 100px;
  }
  .stat-num {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.03em;
  }
  .stat-label {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* Game cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: #3a3e4a; }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }
  .card-title {
    font-size: 1.05rem;
    font-weight: 600;
    line-height: 1.3;
  }
  .badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-approved {
    background: var(--green-bg);
    color: var(--green);
  }
  .badge-published {
    background: var(--green-bg);
    color: var(--green);
  }
  .badge-pending {
    background: var(--yellow-bg);
    color: var(--yellow);
  }
  .badge-draft {
    background: var(--yellow-bg);
    color: var(--yellow);
  }
  .badge-rejected {
    background: var(--red-bg);
    color: var(--red);
  }
  .badge-unpublished {
    background: rgba(139, 143, 163, 0.12);
    color: var(--text-muted);
  }
  .badge-featured {
    background: rgba(108, 99, 255, 0.12);
    color: var(--accent);
    margin-left: 6px;
  }

  .filter-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    align-items: center;
  }
  .filter-bar label {
    font-size: 0.85rem;
    color: var(--text-muted);
    font-weight: 500;
  }
  .filter-select {
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.85rem;
    outline: none;
    cursor: pointer;
  }
  .filter-select:focus { border-color: var(--accent); }

  .review-notes {
    margin-top: 10px;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.85rem;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .review-notes strong {
    color: var(--text);
    font-weight: 500;
  }

  .notes-input {
    width: 100%;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.85rem;
    outline: none;
    resize: vertical;
    min-height: 60px;
    margin-top: 8px;
    font-family: inherit;
  }
  .notes-input:focus { border-color: var(--accent); }
  .notes-input::placeholder { color: var(--text-muted); }

  .btn-approve {
    padding: 12px 20px;
    background: var(--green-bg);
    color: var(--green);
    border: 1px solid rgba(46, 204, 113, 0.25);
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-approve:hover:not(:disabled) {
    background: rgba(46, 204, 113, 0.2);
  }
  .btn-approve:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-reject {
    padding: 12px 20px;
    background: var(--red-bg);
    color: var(--red);
    border: 1px solid rgba(231, 76, 60, 0.25);
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-reject:hover:not(:disabled) {
    background: rgba(231, 76, 60, 0.2);
  }
  .btn-reject:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-feature {
    padding: 12px 20px;
    background: rgba(108, 99, 255, 0.12);
    color: var(--accent);
    border: 1px solid rgba(108, 99, 255, 0.25);
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-feature:hover:not(:disabled) {
    background: rgba(108, 99, 255, 0.2);
  }
  .btn-feature:disabled { opacity: 0.5; cursor: not-allowed; }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 16px;
    font-size: 0.85rem;
    color: var(--text-muted);
    margin-bottom: 14px;
  }
  .card-meta strong { color: var(--text); font-weight: 500; }

  .card-genres {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }
  .genre-tag {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .card-actions {
    display: flex;
    gap: 10px;
    margin-bottom: 0;
  }

  .btn-publish {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-publish:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-do-publish {
    background: var(--green-bg);
    color: var(--green);
    border: 1px solid rgba(46, 204, 113, 0.25);
  }
  .btn-do-publish:hover:not(:disabled) {
    background: rgba(46, 204, 113, 0.2);
  }
  .btn-do-unpublish {
    background: var(--red-bg);
    color: var(--red);
    border: 1px solid rgba(231, 76, 60, 0.25);
  }
  .btn-do-unpublish:hover:not(:disabled) {
    background: rgba(231, 76, 60, 0.2);
  }

  .btn-detail {
    padding: 12px 20px;
    background: var(--bg);
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-detail:hover { border-color: var(--accent); color: var(--accent); }

  .btn-delete {
    padding: 12px 20px;
    background: var(--red-bg);
    color: var(--red);
    border: 1px solid rgba(231, 76, 60, 0.25);
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-delete:hover:not(:disabled) {
    background: rgba(231, 76, 60, 0.25);
  }
  .btn-delete:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Detail / files view */
  .detail-section {
    margin-top: 16px;
    border-top: 1px solid var(--border);
    padding-top: 16px;
  }
  .detail-section h3 {
    font-size: 0.9rem;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .file-list {
    list-style: none;
    margin-bottom: 16px;
  }
  .file-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    font-size: 0.88rem;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .file-item:hover { border-color: var(--accent); }
  .file-item.active { border-color: var(--accent); background: var(--surface-hover); }
  .file-name { font-weight: 500; font-family: "SF Mono", Monaco, Consolas, monospace; }
  .file-size { color: var(--text-muted); font-size: 0.78rem; }
  .file-badge {
    font-size: 0.68rem;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    margin-left: 8px;
  }

  .editor-wrap {
    margin-top: 12px;
  }
  .editor-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .editor-filename {
    font-family: "SF Mono", Monaco, Consolas, monospace;
    font-size: 0.85rem;
    color: var(--accent);
  }
  .btn-save {
    padding: 8px 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-save:hover { background: var(--accent-hover); }
  .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }
  .editor-textarea {
    width: 100%;
    min-height: 300px;
    padding: 14px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: "SF Mono", Monaco, Consolas, monospace;
    font-size: 0.85rem;
    line-height: 1.6;
    resize: vertical;
    outline: none;
    tab-size: 2;
  }
  .editor-textarea:focus { border-color: var(--accent); }
  .editor-textarea[readonly] {
    opacity: 0.7;
    cursor: default;
  }
  .save-status {
    font-size: 0.8rem;
    margin-left: 12px;
  }
  .save-status.success { color: var(--green); }
  .save-status.error { color: var(--red); }

  /* Confirmation dialog */
  .confirm-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .confirm-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px;
    max-width: 400px;
    width: 100%;
  }
  .confirm-card h3 {
    font-size: 1.1rem;
    margin-bottom: 8px;
  }
  .confirm-card p {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .confirm-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }
  .btn-confirm-cancel {
    padding: 10px 20px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-muted);
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-confirm-cancel:hover { border-color: var(--text-muted); }
  .btn-confirm-delete {
    padding: 10px 20px;
    background: var(--red);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-confirm-delete:hover { background: #c0392b; }
  .btn-confirm-delete:disabled { opacity: 0.5; cursor: not-allowed; }

  /* States */
  .loading, .error-msg, .empty-msg {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-muted);
  }
  .error-msg { color: var(--red); }
  .login-error {
    color: var(--red);
    font-size: 0.85rem;
    margin-top: 10px;
    text-align: center;
  }

  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const API_BASE = window.location.origin;

async function apiFetch(path, { token, method = "GET", body = null, json: sendJson = false } = {}) {
  const headers = {};
  if (token) headers["X-Admin-Token"] = token;
  if (sendJson) headers["Content-Type"] = "application/json";
  const opts = { method, headers };
  if (body != null) opts.body = sendJson ? JSON.stringify(body) : body;
  const res = await fetch(`${API_BASE}${path}`, opts);
  if (!res.ok) {
    const data = await res.json().catch(() => ({}));
    throw new Error(data.detail || `Request failed (${res.status})`);
  }
  return res.json();
}

// ── Confirmation Dialog ───────────────────────────────────

function ConfirmDialog({ title, message, confirmLabel, onConfirm, onCancel }) {
  const [busy, setBusy] = useState(false);
  const handleConfirm = async () => {
    setBusy(true);
    try { await onConfirm(); }
    finally { setBusy(false); }
  };
  return (
    <div className="confirm-overlay" onClick={onCancel}>
      <div className="confirm-card" onClick={(e) => e.stopPropagation()}>
        <h3>{title}</h3>
        <p>{message}</p>
        <div className="confirm-actions">
          <button className="btn-confirm-cancel" onClick={onCancel} disabled={busy}>Cancel</button>
          <button className="btn-confirm-delete" onClick={handleConfirm} disabled={busy}>
            {busy ? "Deleting..." : (confirmLabel || "Delete")}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── File Editor ───────────────────────────────────────────

function FileEditor({ slug, file, token, onClose }) {
  const [content, setContent] = useState(null);
  const [originalContent, setOriginalContent] = useState(null);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [saveStatus, setSaveStatus] = useState(null);

  useEffect(() => {
    setLoading(true);
    setSaveStatus(null);
    apiFetch(`/api/admin/games/${slug}/files/${file.filename}`, { token })
      .then((data) => {
        setContent(data.content);
        setOriginalContent(data.content);
      })
      .catch((err) => setSaveStatus({ type: "error", text: err.message }))
      .finally(() => setLoading(false));
  }, [slug, file.filename, token]);

  const handleSave = async () => {
    setSaving(true);
    setSaveStatus(null);
    try {
      await apiFetch(`/api/admin/games/${slug}/files/${file.filename}`, {
        token,
        method: "PUT",
        body: { content },
        json: true,
      });
      setOriginalContent(content);
      setSaveStatus({ type: "success", text: "Saved" });
    } catch (err) {
      setSaveStatus({ type: "error", text: err.message });
    } finally {
      setSaving(false);
    }
  };

  const modified = content !== originalContent;

  return (
    <div className="editor-wrap">
      <div className="editor-header">
        <span className="editor-filename">{file.filename}</span>
        <div style={{ display: "flex", alignItems: "center" }}>
          {saveStatus && (
            <span className={`save-status ${saveStatus.type}`}>{saveStatus.text}</span>
          )}
          {file.editable && (
            <button className="btn-save" onClick={handleSave} disabled={saving || !modified}>
              {saving ? "Saving..." : "Save"}
            </button>
          )}
        </div>
      </div>
      {loading ? (
        <div className="loading" style={{ padding: "24px" }}>
          <div className="spinner" />
          Loading file...
        </div>
      ) : (
        <textarea
          className="editor-textarea"
          value={content || ""}
          onChange={(e) => { setContent(e.target.value); setSaveStatus(null); }}
          readOnly={!file.editable}
          spellCheck={false}
        />
      )}
    </div>
  );
}

// ── Game Detail Panel ─────────────────────────────────────

function GameDetail({ slug, token }) {
  const [files, setFiles] = useState(null);
  const [selectedFile, setSelectedFile] = useState(null);
  const [error, setError] = useState(null);

  useEffect(() => {
    setError(null);
    setSelectedFile(null);
    apiFetch(`/api/admin/games/${slug}/files`, { token })
      .then((data) => setFiles(data.files || []))
      .catch((err) => setError(err.message));
  }, [slug, token]);

  if (error) return <div className="error-msg" style={{ padding: "16px" }}>{error}</div>;
  if (!files) return (
    <div className="loading" style={{ padding: "24px" }}>
      <div className="spinner" />
      Loading files...
    </div>
  );

  const formatSize = (bytes) => {
    if (bytes < 1024) return `${bytes} B`;
    return `${(bytes / 1024).toFixed(1)} KB`;
  };

  return (
    <div className="detail-section">
      <h3>Package Files</h3>
      <ul className="file-list">
        {files.map((f) => (
          <li
            key={f.filename}
            className={`file-item ${selectedFile && selectedFile.filename === f.filename ? "active" : ""}`}
            onClick={() => setSelectedFile(selectedFile?.filename === f.filename ? null : f)}
          >
            <span>
              <span className="file-name">{f.filename}</span>
              {f.editable && <span className="file-badge">editable</span>}
            </span>
            <span className="file-size">{formatSize(f.size)}</span>
          </li>
        ))}
      </ul>
      {selectedFile && (
        <FileEditor
          key={selectedFile.filename}
          slug={slug}
          file={selectedFile}
          token={token}
          onClose={() => setSelectedFile(null)}
        />
      )}
    </div>
  );
}

// ── Login Screen ──────────────────────────────────────────

function LoginScreen({ onLogin }) {
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const handleSubmit = async (e) => {
    e.preventDefault();
    const token = input.trim();
    if (!token) return;
    setLoading(true);
    setError(null);
    try {
      await apiFetch("/api/admin/games", { token });
      localStorage.setItem("anyzork_admin_token", token);
      onLogin(token);
    } catch (err) {
      setError(err.message || "Could not connect. Check your token.");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="login-wrap">
      <form className="login-card" onSubmit={handleSubmit}>
        <h2>AnyZork Admin</h2>
        <p>Enter your admin token to manage games.</p>
        <input
          className="input"
          type="password"
          placeholder="Admin token"
          value={input}
          onChange={(e) => setInput(e.target.value)}
          autoFocus
        />
        <button className="btn" type="submit" disabled={loading || !input.trim()}>
          {loading ? "Connecting..." : "Connect"}
        </button>
        {error && <div className="login-error">{error}</div>}
      </form>
    </div>
  );
}

// ── Game Card ─────────────────────────────────────────────

function GameCard({ game, token, onToggled, onDeleted }) {
  const [busy, setBusy] = useState(false);
  const [expanded, setExpanded] = useState(false);
  const [showConfirm, setShowConfirm] = useState(false);
  const [reviewNotes, setReviewNotes] = useState(game.review_notes || "");

  const status = game.status || (game.published ? "approved" : "pending");
  const badgeClass = `badge badge-${status}`;

  const doAction = async (action, body = null) => {
    setBusy(true);
    try {
      const opts = { token, method: "POST" };
      if (body) { opts.body = body; opts.json = true; }
      await apiFetch(`/api/admin/games/${game.slug}/${action}`, opts);
      onToggled();
    } catch (err) {
      alert(err.message || "Action failed.");
    } finally {
      setBusy(false);
    }
  };

  const handleApprove = () => doAction("approve", { review_notes: reviewNotes });
  const handleReject = () => doAction("reject", { review_notes: reviewNotes });
  const handleFeature = () => doAction("feature", { featured: !game.featured });
  const handleUnpublish = () => doAction("unpublish");

  const handleDelete = async () => {
    await apiFetch(`/api/admin/games/${game.slug}`, {
      token,
      method: "DELETE",
    });
    setShowConfirm(false);
    onDeleted();
  };

  const genres = game.genres || [];

  return (
    <div className="card">
      <div className="card-top">
        <div className="card-title">{game.title || game.slug}</div>
        <div style={{ display: "flex", alignItems: "center", gap: "6px" }}>
          <span className={badgeClass}>{status}</span>
          {game.featured && <span className="badge badge-featured">Featured</span>}
        </div>
      </div>

      <div className="card-meta">
        <span><strong>{game.slug}</strong></span>
        {game.author && <span>by {game.author}</span>}
        {game.room_count != null && <span>{game.room_count} rooms</span>}
      </div>

      {genres.length > 0 && (
        <div className="card-genres">
          {genres.map((g) => (
            <span className="genre-tag" key={g}>{g}</span>
          ))}
        </div>
      )}

      {game.review_notes && (
        <div className="review-notes">
          <strong>Review notes:</strong> {game.review_notes}
        </div>
      )}

      <textarea
        className="notes-input"
        placeholder="Add review notes (optional)..."
        value={reviewNotes}
        onChange={(e) => setReviewNotes(e.target.value)}
      />

      <div className="card-actions" style={{ marginTop: "10px" }}>
        {status !== "approved" && (
          <button className="btn-approve" onClick={handleApprove} disabled={busy}>
            {busy ? "..." : "Approve"}
          </button>
        )}
        {status !== "rejected" && (
          <button className="btn-reject" onClick={handleReject} disabled={busy}>
            {busy ? "..." : "Reject"}
          </button>
        )}
        {status === "approved" && (
          <>
            <button className="btn-feature" onClick={handleFeature} disabled={busy}>
              {game.featured ? "Unfeature" : "Feature"}
            </button>
            <button className="btn-do-unpublish btn-publish" onClick={handleUnpublish} disabled={busy}>
              Unpublish
            </button>
          </>
        )}
        <button className="btn-detail" onClick={() => setExpanded(!expanded)}>
          {expanded ? "Collapse" : "Files"}
        </button>
        <button className="btn-delete" onClick={() => setShowConfirm(true)}>
          Delete
        </button>
      </div>

      {expanded && <GameDetail slug={game.slug} token={token} />}

      {showConfirm && (
        <ConfirmDialog
          title="Delete Game"
          message={`Are you sure you want to permanently delete "${game.title || game.slug}"? This action cannot be undone.`}
          confirmLabel="Delete Game"
          onConfirm={handleDelete}
          onCancel={() => setShowConfirm(false)}
        />
      )}
    </div>
  );
}

// ── Dashboard ─────────────────────────────────────────────

function Dashboard({ token, onLogout }) {
  const [games, setGames] = useState(null);
  const [error, setError] = useState(null);
  const [statusFilter, setStatusFilter] = useState("");

  const loadGames = useCallback(async () => {
    setError(null);
    try {
      const query = statusFilter ? `?status=${statusFilter}` : "";
      const data = await apiFetch(`/api/admin/games${query}`, { token });
      setGames(data.games || []);
    } catch (err) {
      if (err.message && err.message.includes("403")) {
        localStorage.removeItem("anyzork_admin_token");
        onLogout();
        return;
      }
      setError(err.message || "Failed to load games.");
    }
  }, [token, onLogout, statusFilter]);

  useEffect(() => { loadGames(); }, [loadGames]);

  const countByStatus = (s) => games ? games.filter((g) => g.status === s).length : 0;

  return (
    <>
      <header className="header">
        <h1>Any<span>Zork</span> Admin</h1>
        <button className="btn-logout" onClick={onLogout}>Log out</button>
      </header>

      <main className="content">
        {error && <div className="error-msg">{error}</div>}

        {!games && !error && (
          <div className="loading">
            <div className="spinner" />
            Loading games...
          </div>
        )}

        {games && (
          <>
            <div className="stats-bar">
              <div className="stat">
                <div className="stat-num">{games.length}</div>
                <div className="stat-label">{statusFilter || "Total"}</div>
              </div>
              <div className="stat">
                <div className="stat-num">{countByStatus("pending")}</div>
                <div className="stat-label">Pending</div>
              </div>
              <div className="stat">
                <div className="stat-num">{countByStatus("approved")}</div>
                <div className="stat-label">Approved</div>
              </div>
              <div className="stat">
                <div className="stat-num">{countByStatus("rejected")}</div>
                <div className="stat-label">Rejected</div>
              </div>
            </div>

            <div className="filter-bar">
              <label>Filter by status:</label>
              <select
                className="filter-select"
                value={statusFilter}
                onChange={(e) => setStatusFilter(e.target.value)}
              >
                <option value="">All</option>
                <option value="pending">Pending</option>
                <option value="approved">Approved</option>
                <option value="rejected">Rejected</option>
                <option value="unpublished">Unpublished</option>
              </select>
            </div>

            {games.length === 0 && (
              <div className="empty-msg">
                {statusFilter ? `No ${statusFilter} games.` : "No games uploaded yet."}
              </div>
            )}

            {games.map((game) => (
              <GameCard
                key={game.slug}
                game={game}
                token={token}
                onToggled={loadGames}
                onDeleted={loadGames}
              />
            ))}
          </>
        )}
      </main>
    </>
  );
}

// ── App Root ──────────────────────────────────────────────

function App() {
  const [token, setToken] = useState(() => localStorage.getItem("anyzork_admin_token"));

  const handleLogout = useCallback(() => {
    localStorage.removeItem("anyzork_admin_token");
    setToken(null);
  }, []);

  if (!token) return <LoginScreen onLogin={setToken} />;
  return <Dashboard token={token} onLogout={handleLogout} />;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
