<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnyZork - Create infinite text adventures with AI</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<meta name="description" content="Generate, author, and play Zork-style text adventures with AI. No LLM required at runtime.">
<meta property="og:title" content="AnyZork — Create Infinite Text Adventures">
<meta property="og:description" content="Generate, author, and play Zork-style text adventures with AI. No LLM required at runtime.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://anyzork.com">
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface-hover: #22262f;
    --border: #2a2e3a; --text: #e4e6eb; --text-muted: #8b8fa3;
    --accent: #6c63ff; --accent-hover: #5a52e0; --green: #2ecc71;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100dvh; -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  .section { padding: 80px 20px; max-width: 1100px; margin: 0 auto; }
  .section-alt { background: var(--surface); }
  .section-alt .section { padding: 60px 20px; }
  .section-heading {
    font-size: 1.8rem; font-weight: 700; letter-spacing: -0.03em;
    margin-bottom: 12px; text-align: center;
  }
  .section-sub {
    color: var(--text-muted); font-size: 1rem; text-align: center;
    margin-bottom: 48px; max-width: 560px; margin-left: auto;
    margin-right: auto; line-height: 1.6;
  }

  /* Hero */
  .hero { text-align: center; padding: 100px 20px 80px; max-width: 720px; margin: 0 auto; }
  .hero-title {
    font-size: 3.2rem; font-weight: 800; letter-spacing: -0.04em;
    line-height: 1.1; margin-bottom: 20px;
  }
  .hero-title span { color: var(--accent); }
  .hero-tagline { font-size: 1.25rem; color: var(--text); margin-bottom: 8px; font-weight: 500; }
  .hero-sub { font-size: 1rem; color: var(--text-muted); margin-bottom: 36px; line-height: 1.6; }
  .btn-cta {
    display: inline-block; padding: 16px 36px; background: var(--accent);
    color: #fff; border: none; border-radius: 8px; font-size: 1.05rem;
    font-weight: 600; cursor: pointer; transition: background 0.15s; text-decoration: none;
  }
  .btn-cta:hover { background: var(--accent-hover); text-decoration: none; }

  /* Steps */
  .steps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; }
  .step {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px 20px;
    text-align: center; transition: border-color 0.15s;
  }
  .step:hover { border-color: #3a3e4a; }
  .step-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(108, 99, 255, 0.12); color: var(--accent);
    font-weight: 700; font-size: 0.9rem; margin-bottom: 16px;
  }
  .step-title { font-size: 1rem; font-weight: 600; margin-bottom: 8px; }
  .step-desc { font-size: 0.88rem; color: var(--text-muted); line-height: 1.5; }
  .step-desc code {
    background: var(--bg); padding: 2px 6px; border-radius: 4px;
    font-size: 0.82rem; font-family: "SF Mono", Monaco, Consolas, monospace; color: var(--accent);
  }

  /* Catalog */
  .catalog-search { position: relative; max-width: 480px; margin: 0 auto 36px; }
  .catalog-search input {
    width: 100%; padding: 14px 44px 14px 18px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 8px; color: var(--text);
    font-size: 0.95rem; outline: none; transition: border 0.15s;
  }
  .catalog-search input:focus { border-color: var(--accent); }
  .catalog-search input::placeholder { color: var(--text-muted); }
  .search-clear {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--text-muted); font-size: 1.1rem;
    cursor: pointer; padding: 4px 8px; line-height: 1; border-radius: 4px; transition: color 0.15s;
  }
  .search-clear:hover { color: var(--text); }
  .card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  .game-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px 20px;
    display: flex; flex-direction: column; transition: border-color 0.15s;
  }
  .game-card:hover { border-color: #3a3e4a; }
  .card-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 10px; margin-bottom: 8px;
  }
  .card-title { font-size: 1.05rem; font-weight: 600; line-height: 1.3; }
  .badge-featured {
    display: inline-block; padding: 4px 10px; border-radius: 20px;
    font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; white-space: nowrap; flex-shrink: 0;
    background: rgba(108, 99, 255, 0.12); color: var(--accent);
  }
  .card-author { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; }
  .card-tagline {
    font-size: 0.9rem; font-style: italic; color: var(--text-muted);
    margin-bottom: 14px; line-height: 1.5; flex: 1;
  }
  .card-genres { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .genre-tag {
    background: var(--bg); border: 1px solid var(--border);
    padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; color: var(--text-muted);
  }
  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; margin-top: auto;
  }
  .card-rooms { font-size: 0.8rem; color: var(--text-muted); }
  .btn-download {
    padding: 8px 18px; background: rgba(108, 99, 255, 0.12); color: var(--accent);
    border: 1px solid rgba(108, 99, 255, 0.25); border-radius: 8px;
    font-size: 0.85rem; font-weight: 600; cursor: pointer;
    transition: all 0.15s; text-decoration: none; display: inline-block;
  }
  .btn-download:hover { background: rgba(108, 99, 255, 0.2); text-decoration: none; }

  /* Loading / Empty */
  .loading, .empty-msg { text-align: center; padding: 48px 20px; color: var(--text-muted); }
  .spinner {
    width: 28px; height: 28px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.7s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Install */
  .install-wrap { max-width: 520px; margin: 0 auto; text-align: center; }
  .code-block {
    position: relative; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 18px 20px; margin-bottom: 14px; text-align: left;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .code-block code {
    font-family: "SF Mono", Monaco, Consolas, monospace; font-size: 0.95rem; color: var(--text);
  }
  .btn-copy {
    padding: 6px 14px; background: var(--surface); color: var(--text-muted);
    border: 1px solid var(--border); border-radius: 6px; font-size: 0.78rem;
    font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
  }
  .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
  .install-alt { font-size: 0.88rem; color: var(--text-muted); margin-bottom: 24px; }
  .install-alt code {
    background: var(--bg); padding: 2px 6px; border-radius: 4px;
    font-size: 0.82rem; font-family: "SF Mono", Monaco, Consolas, monospace; color: var(--accent);
  }
  .install-links { display: flex; gap: 24px; justify-content: center; }
  .install-links a { font-size: 0.9rem; font-weight: 500; }

  /* Footer */
  .footer {
    border-top: 1px solid var(--border); padding: 32px 20px;
    text-align: center; color: var(--text-muted); font-size: 0.85rem;
  }
  .footer-inner {
    max-width: 1100px; margin: 0 auto; display: flex;
    align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap;
  }
  .footer-badge {
    display: inline-block; padding: 4px 12px; background: rgba(108, 99, 255, 0.12);
    color: var(--accent); border-radius: 20px; font-size: 0.75rem; font-weight: 600;
  }

  /* Responsive */
  @media (max-width: 900px) { .card-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 640px) {
    .hero { padding: 60px 20px 50px; }
    .hero-title { font-size: 2.2rem; }
    .hero-tagline { font-size: 1.05rem; }
    .section { padding: 50px 16px; }
    .section-alt .section { padding: 40px 16px; }
    .section-heading { font-size: 1.4rem; }
    .steps { grid-template-columns: 1fr; gap: 14px; }
    .card-grid { grid-template-columns: 1fr; }
    .footer-inner { flex-direction: column; gap: 10px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

const API_BASE = window.location.origin;

/* ── Hero ───────────────────────────────────────────── */
function Hero() {
  return (
    <div className="hero">
      <h1 className="hero-title">Any<span>Zork</span></h1>
      <p className="hero-tagline">Create infinite text adventures with AI</p>
      <p className="hero-sub">
        Generate, author, and play Zork-style games. No LLM at runtime.
      </p>
      <a href="#install" className="btn-cta">Get Started</a>
    </div>
  );
}

/* ── How It Works ───────────────────────────────────── */
const STEPS = [
  { num: 1, title: "Generate", desc: <>Run <code>anyzork generate</code> to create an authoring prompt</> },
  { num: 2, title: "Author",   desc: <>Feed it to any LLM to get ZorkScript</> },
  { num: 3, title: "Compile",  desc: <>Run <code>anyzork import</code> to compile your game</> },
  { num: 4, title: "Play",     desc: <>Run <code>anyzork play</code> to start your adventure</> },
];

function HowItWorks() {
  return (
    <div className="section-alt">
      <div className="section">
        <h2 className="section-heading">How It Works</h2>
        <p className="section-sub">Four steps from idea to playable game</p>
        <div className="steps">
          {STEPS.map(s => (
            <div className="step" key={s.num}>
              <div className="step-num">{s.num}</div>
              <div className="step-title">{s.title}</div>
              <div className="step-desc">{s.desc}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── Game Catalog ───────────────────────────────────── */
function GameCard({ game }) {
  return (
    <div className="game-card">
      <div className="card-header">
        <div className="card-title">{game.title}</div>
        {game.featured && <span className="badge-featured">Featured</span>}
      </div>
      {game.author && <div className="card-author">by {game.author}</div>}
      {game.tagline && <div className="card-tagline">{game.tagline}</div>}
      {game.genres && game.genres.length > 0 && (
        <div className="card-genres">
          {game.genres.map(g => <span className="genre-tag" key={g}>{g}</span>)}
        </div>
      )}
      <div className="card-footer">
        <span className="card-rooms">
          {game.room_count != null ? `${game.room_count} room${game.room_count !== 1 ? "s" : ""}` : ""}
        </span>
        {game.download_url && (
          <a href={game.download_url} className="btn-download" download>Download</a>
        )}
      </div>
    </div>
  );
}

function Catalog() {
  const [games, setGames] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [search, setSearch] = useState("");

  useEffect(() => {
    fetch(`${API_BASE}/api/games`)
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(data => { setGames(data.games || []); setLoading(false); })
      .catch(err => { setError(err.message); setLoading(false); });
  }, []);

  const sorted = useMemo(() => [...games].sort((a, b) => {
    if (a.featured && !b.featured) return -1;
    if (!a.featured && b.featured) return 1;
    return (a.title || "").localeCompare(b.title || "");
  }), [games]);

  const filtered = useMemo(() => {
    if (!search.trim()) return sorted;
    const q = search.toLowerCase();
    return sorted.filter(g =>
      (g.title || "").toLowerCase().includes(q) ||
      (g.author || "").toLowerCase().includes(q) ||
      (g.tagline || "").toLowerCase().includes(q)
    );
  }, [sorted, search]);

  return (
    <div className="section" id="catalog">
      <h2 className="section-heading">Game Catalog</h2>
      <p className="section-sub">Browse and download community-created text adventures</p>
      <div className="catalog-search">
        <input
          type="text"
          placeholder="Search games by title, author, or tagline..."
          value={search}
          onChange={e => setSearch(e.target.value)}
          aria-label="Search games"
        />
        {search && (
          <button className="search-clear" onClick={() => setSearch("")} aria-label="Clear search">
            &times;
          </button>
        )}
      </div>
      {loading && (
        <div className="loading"><div className="spinner" />Loading games...</div>
      )}
      {error && (
        <div className="loading" style={{ color: "var(--text-muted)" }}>No games published yet</div>
      )}
      {!loading && !error && filtered.length === 0 && (
        <div className="empty-msg">
          {search ? "No games match your search" : "No games published yet"}
        </div>
      )}
      {!loading && !error && filtered.length > 0 && (
        <div className="card-grid">
          {filtered.map(g => <GameCard key={g.slug} game={g} />)}
        </div>
      )}
    </div>
  );
}

/* ── Install ────────────────────────────────────────── */
function Install() {
  const [copied, setCopied] = useState(null);
  const copy = useCallback((text, id) => {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(id);
      setTimeout(() => setCopied(null), 2000);
    });
  }, []);

  return (
    <div className="section-alt" id="install">
      <div className="section">
        <h2 className="section-heading">Install AnyZork</h2>
        <p className="section-sub">Get started in seconds with pip or pipx</p>
        <div className="install-wrap">
          <div className="code-block">
            <code>pipx install anyzork</code>
            <button className="btn-copy" onClick={() => copy("pipx install anyzork", "pipx")}>
              {copied === "pipx" ? "Copied!" : "Copy"}
            </button>
          </div>
          <p className="install-alt">Or with pip: <code>pip install anyzork</code></p>
          <div className="install-links">
            <a href="https://github.com/oobagi/anyzork" target="_blank" rel="noopener noreferrer">GitHub</a>
            <a href="https://pypi.org/project/anyzork/" target="_blank" rel="noopener noreferrer">PyPI</a>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── Footer ─────────────────────────────────────────── */
function Footer() {
  return (
    <footer className="footer">
      <div className="footer-inner">
        <span>AnyZork &mdash; MIT License</span>
        <a href="https://github.com/oobagi/anyzork" target="_blank" rel="noopener noreferrer">GitHub</a>
        <span className="footer-badge">Made with AI</span>
      </div>
    </footer>
  );
}

/* ── App ────────────────────────────────────────────── */
function App() {
  return (
    <>
      <Hero />
      <HowItWorks />
      <Catalog />
      <Install />
      <Footer />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
